<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapforce-dle</title>
    <style>
        :root {
            --correct: #2ecc71;
            --incorrect: #e74c3c;
            --bg: #0b0e14;
            --card-bg: #1a1f29;
            --text: #ffffff;
            --accent: #3498db;
            --dropdown-border: #333;
            --dropdown-hover: #2c3e50;
        }

        body {
            font-family: 'Orbitron', sans-serif, Arial;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
            width: 100%;
            max-width: 850px;
        }

        .mode-selector {
            margin: 15px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            background: #222;
            border: 1px solid var(--accent);
            color: white;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            transition: 0.3s;
        }

        .mode-btn.active {
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .game-container {
            width: 100%;
            max-width: 850px;
            text-align: center;
        }

        .ultimate-hint-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--accent);
            margin-bottom: 20px;
            display: none;
        }

        #skillText {
            display: block;
            font-size: 1.5rem;
            color: #f1c40f;
            text-shadow: 0 0 5px rgba(241, 196, 15, 0.5);
            margin-top: 10px;
        }

        #factionClue {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #3498db;
            font-style: italic;
            display: none;
        }

        .input-group {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        .input-container { position: relative; width: 65%; }

        input {
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #111;
            color: white;
            outline: none;
            box-sizing: border-box;
            font-size: 16px;
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--dropdown-border);
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .dropdown-item {
            padding: 12px;
            cursor: pointer;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        .dropdown-item:hover { background: var(--dropdown-hover); }

        .results-container { display: flex; flex-direction: column; gap: 10px; }

        .row {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 1fr 1fr 1.2fr;
            gap: 8px;
        }

        .ultimate-row {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 5px;
            font-weight: bold;
            text-align: center;
        }

        .cell {
            background-color: var(--card-bg);
            padding: 15px 5px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid #2c3e50;
            font-size: 11px;
            min-height: 70px;
            text-transform: uppercase;
        }

        .cell span { font-size: 8px; opacity: 0.6; margin-bottom: 5px; }

        .correct { background-color: var(--correct) !important; color: white; }
        .incorrect { background-color: var(--incorrect) !important; color: white; }

        #message { margin-bottom: 20px; font-weight: bold; height: 30px; }
        .btn-replay { 
            padding: 15px 25px; 
            background: #f1c40f; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            display: none; 
            margin: 20px auto;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>

        function changeMode(mode) {
            modoActual = mode;
            document.getElementById('btnClassic').classList.toggle('active', mode === 'classic');
            document.getElementById('btnUltimates').classList.toggle('active', mode === 'ultimates');
            resetGame();
        }

        function resetGame() {
            objetivo = personajesData[Math.floor(Math.random() * personajesData.length)];
            intentos = 0;
            resultsContainer.innerHTML = '';
            document.getElementById('message').textContent = '';
            document.getElementById('replayBtn').style.display = 'none';
            document.getElementById('factionClue').style.display = 'none';
            inputGuess.value = '';
            inputGuess.disabled = false;
            dropdownMenu.style.display = 'none';

            if(modoActual === 'ultimates') {
                document.getElementById('ultimateBox').style.display = 'block';
                document.getElementById('skillText').textContent = objetivo.ultimate;
                document.getElementById('clueName').textContent = objetivo.faccion;
                inputGuess.placeholder = "Adivina el luchador...";
            } else {
                document.getElementById('ultimateBox').style.display = 'none';
                inputGuess.placeholder = "Nombre del luchador...";
            }
            inputGuess.focus();
        }

        function showDropdown() {
            const val = inputGuess.value.trim().toUpperCase();
            dropdownMenu.innerHTML = '';
            if (val.length > 0) {
                const filtrados = nombresOrdenados.filter(n => n.startsWith(val));
                if(filtrados.length > 0) {
                    dropdownMenu.style.display = 'block';
                    filtrados.forEach(n => {
                        const item = document.createElement('div');
                        item.className = 'dropdown-item';
                        item.textContent = n;
                        item.onclick = () => { 
                            inputGuess.value = n; 
                            dropdownMenu.style.display = 'none'; 
                            makeGuess(); 
                        };
                        dropdownMenu.appendChild(item);
                    });
                } else { dropdownMenu.style.display = 'none'; }
            } else { dropdownMenu.style.display = 'none'; }
        }

        function makeGuess() {
            const valor = inputGuess.value.trim().toUpperCase();
            const seleccion = personajesData.find(p => p.nombre === valor);
            
            dropdownMenu.style.display = 'none';

            if (!seleccion) {
                if(valor !== "") {
                    document.getElementById('message').textContent = "❌ LUCHADOR NO RECONOCIDO";
                    document.getElementById('message').style.color = "#e74c3c";
                }
                return;
            }

            document.getElementById('message').textContent = "";
            intentos++;
            
            if(modoActual === 'ultimates' && intentos === 5) {
                document.getElementById('factionClue').style.display = 'block';
            }

            if(modoActual === 'classic') renderClassicRow(seleccion);
            else renderUltimateRow(seleccion);

            if(seleccion.nombre === objetivo.nombre) {
                document.getElementById('message').textContent = "✅ ¡ACERTADO! ES " + objetivo.nombre;
                document.getElementById('message').style.color = "#2ecc71";
                inputGuess.disabled = true;
                document.getElementById('replayBtn').style.display = 'block';
            } else {
                inputGuess.value = '';
                inputGuess.focus();
            }
        }

            const row = document.createElement('div');
            row.className = 'row';
            const check = (a, b) => a === b ? 'correct' : 'incorrect';
            
            let arrow = "";
            if (pj.rango !== objetivo.rango) {
                arrow = VAL_RANGO[objetivo.rango] > VAL_RANGO[pj.rango] ? " ↑" : " ↓";
            }

            row.innerHTML = `
                <div class="cell ${check(pj.nombre, objetivo.nombre)}"><span>LUCHADOR</span>${pj.nombre}</div>
                <div class="cell ${check(pj.genero, objetivo.genero)}"><span>GENERO</span>${pj.genero}</div>
                <div class="cell ${check(pj.faccion, objetivo.faccion)}"><span>FACCION</span>${pj.faccion}</div>
                <div class="cell ${check(pj.clase, objetivo.clase)}"><span>CLASE</span>${pj.clase}</div>
                <div class="cell ${check(pj.rango, objetivo.rango)}"><span>RANGO</span>${pj.rango}${arrow}</div>
            `;
            resultsContainer.prepend(row);
        }

        function renderUltimateRow(pj) {
            const div = document.createElement('div');
            const win = pj.nombre === objetivo.nombre;
            div.className = `ultimate-row ${win ? 'correct' : 'incorrect'}`;
            div.textContent = win ? `¡CORRECTO! ES ${pj.nombre}` : `INTENTO ${intentos}: ${pj.nombre} (FALLIDO)`;
            resultsContainer.prepend(div);
        }

        
        document.addEventListener('click', (e) => {
            if (e.target !== inputGuess && e.target !== dropdownMenu) {
                dropdownMenu.style.display = 'none';
            }
        });

        inputGuess.addEventListener('input', showDropdown);
        inputGuess.addEventListener('focus', showDropdown);
        inputGuess.addEventListener('keypress', (e) => { if(e.key === 'Enter') makeGuess(); });
        
        resetGame();
    </script>
</body>
</html>
