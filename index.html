<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapforce-dle</title>
    <style>
        :root {
            --correct: #2ecc71;
            --present: #f1c40f;
            --incorrect: #34495e;
            --bg: #0b0e14;
            --card-bg: #1a1f29;
            --text: #ffffff;
            --accent: #3498db;
        }

        body {
            font-family: 'Orbitron', sans-serif, Arial;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            margin: 0;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 15px;
            width: 100%;
            max-width: 950px;
        }

        h1 { font-size: 2.8rem; margin: 0; letter-spacing: 3px; }

        #statsCounter {
            margin: 15px 0;
            font-size: 1.4rem;
            color: var(--present);
            font-weight: bold;
        }

        .mode-selector {
            margin: 20px 0;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 25px;
            background: #222;
            border: 2px solid var(--accent);
            color: white;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .mode-btn.active {
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }

        .input-group {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 600px;
        }

        .input-container { position: relative; width: 75%; }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 10px;
            border: 2px solid #333;
            background: #111;
            color: white;
            font-size: 18px;
            outline: none;
            box-sizing: border-box;
        }

        .dropdown-menu {
            position: absolute;
            top: 105%;
            left: 0;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--accent);
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            border-radius: 0 0 10px 10px;
        }

        .dropdown-item {
            padding: 15px;
            cursor: pointer;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        .results-container { width: 100%; max-width: 950px; }
        
        /* MODO CLÁSICO XL */
        .row { display: grid; grid-template-columns: 1.2fr 0.8fr 1fr 1fr 1.2fr; gap: 12px; margin-bottom: 15px; }
        .cell { 
            background: var(--card-bg); padding: 25px 10px; border-radius: 12px; 
            text-align: center; font-size: 15px; border: 1px solid #2c3e50;
            font-weight: bold; display: flex; flex-direction: column; justify-content: center; min-height: 90px;
        }
        .cell span { display: block; font-size: 10px; opacity: 0.7; margin-bottom: 8px; font-weight: normal; }

        /* MODO LETROSO */
        .letroso-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; }
        .letroso-cell {
            width: 55px; height: 55px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.6rem; border-radius: 6px; text-transform: uppercase;
            background: var(--incorrect); border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }

        .ultimate-box { 
            padding: 25px; border-radius: 12px; margin-bottom: 25px; 
            font-weight: bold; text-align: center; font-size: 1.3rem;
            background: var(--card-bg); border: 2px solid var(--accent);
        }

        #factionClue { margin-top: 10px; font-size: 1rem; color: var(--accent); font-style: italic; }

        .correct { background-color: var(--correct) !important; box-shadow: 0 0 10px var(--correct); }
        .present { background-color: var(--present) !important; color: black !important; box-shadow: 0 0 10px var(--present); }
        .incorrect-btn { background-color: #e74c3c !important; }

        .btn-replay { 
            padding: 20px 40px; background: var(--present); border: none; border-radius: 10px; 
            cursor: pointer; display: none; margin: 30px auto; font-weight: bold; font-family: 'Orbitron'; font-size: 1.2rem;
            color: black;
        }

        #attemptsLeft { margin-top: 5px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

        <div id="statsCounter">LOGRADOS: <span id="winCount">0</span></div>
        <div class="mode-selector">
            <button id="btnClassic" class="mode-btn active" onclick="changeMode('classic')">MODO CLÁSICO</button>

            <button id="btnUltimates" class="mode-btn" onclick="changeMode('ultimates')">ULTIMATES</button>
        </div>
    </div>

    <div id="ultimateBox" class="ultimate-box" style="display:none;">

    </div>

            <input type="text" id="guessInput" placeholder="Nombre del luchador..." autocomplete="off">
            <div id="dropdownMenu" class="dropdown-menu"></div>
            <div id="attemptsLeft" style="display:none;">Intentos restantes: <span id="counterNum">6</span></div>
        </div>
        <button class="mode-btn" style="background:var(--accent); font-weight: bold;" onclick="makeGuess()">ENVIAR</button>
    </div>

    <div id="message" style="margin-bottom:20px; font-size: 1.5rem; text-align: center; min-height: 40px;"></div>
    <div id="results" class="results-container"></div>

        let objetivo, modoActual = 'classic', victorias = sessionStorage.getItem('tf_wins') || 0;
        let listaDisponibles = [], intentos = 0;
        const MAX_INTENTOS_LETROSO = 6;

        const inputGuess = document.getElementById('guessInput'), dropdownMenu = document.getElementById('dropdownMenu'), resultsContainer = document.getElementById('results'), msgArea = document.getElementById('message');

        function changeMode(m) {
            modoActual = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            const btnId = m === 'letroso' ? 'btnLetroso' : 'btn' + m.charAt(0).toUpperCase() + m.slice(1);
            document.getElementById(btnId).classList.add('active');
            resetGame();
        }

        function resetGame() {
            objetivo = personajesFull[Math.floor(Math.random() * personajesFull.length)];
            listaDisponibles = [...personajesFull];
            intentos = 0;
            resultsContainer.innerHTML = '';
            msgArea.textContent = '';
            document.getElementById('replayBtn').style.display = 'none';
            document.getElementById('factionClue').style.display = 'none';
            inputGuess.disabled = false; inputGuess.value = '';
            document.getElementById('winCount').textContent = victorias;
            
            const attemptsUI = document.getElementById('attemptsLeft');
            if(modoActual === 'letroso') {
                attemptsUI.style.display = 'block';
                updateCounter();
            } else {
                attemptsUI.style.display = 'none';
            }

            if(modoActual === 'ultimates') {
                document.getElementById('ultimateBox').style.display = 'block';
                document.getElementById('skillText').textContent = objetivo.ultimate;
                document.getElementById('clueName').textContent = objetivo.faccion;
            } else {
                document.getElementById('ultimateBox').style.display = 'none';
            }
            inputGuess.focus();
        }

        function updateCounter() {
            document.getElementById('counterNum').textContent = MAX_INTENTOS_LETROSO - intentos;
        }

        function showDropdown() {
            const val = inputGuess.value.toUpperCase();
            dropdownMenu.innerHTML = '';
            if (val.length > 0) {
                const filtrados = listaDisponibles.filter(p => p.nombre.startsWith(val));
                if(filtrados.length > 0) {
                    dropdownMenu.style.display = 'block';
                    filtrados.forEach(p => {
                        const item = document.createElement('div');
                        item.className = 'dropdown-item';
                        item.textContent = p.nombre;
                        item.onclick = () => { inputGuess.value = p.nombre; dropdownMenu.style.display = 'none'; makeGuess(); };
                        dropdownMenu.appendChild(item);
                    });
                } else dropdownMenu.style.display = 'none';
            } else dropdownMenu.style.display = 'none';
        }

        function makeGuess() {
            const val = inputGuess.value.trim().toUpperCase();
            const idx = listaDisponibles.findIndex(p => p.nombre === val);
            if (idx === -1) return;
            
            const pj = listaDisponibles[idx];
            dropdownMenu.style.display = 'none';
            listaDisponibles.splice(idx, 1);
            intentos++;

            if(modoActual === 'letroso') updateCounter();

            if(modoActual === 'ultimates' && intentos >= 5) {
                document.getElementById('factionClue').style.display = 'block';
            }

            if (modoActual === 'classic') renderClassic(pj);
            else if (modoActual === 'letroso') renderLetroso(val);
            else renderUltimate(pj);

            if (val === objetivo.nombre) {
                victorias++; sessionStorage.setItem('tf_wins', victorias);
                document.getElementById('winCount').textContent = victorias;
                msgArea.textContent = "🏆 ¡LOGRADO! ES " + objetivo.nombre;
                msgArea.style.color = "#2ecc71";
                endGame();
            } else if (modoActual === 'letroso' && intentos >= MAX_INTENTOS_LETROSO) {
                msgArea.textContent = "❌ FALLASTE. ERA: " + objetivo.nombre;
                msgArea.style.color = "#e74c3c";
                endGame();
            } else {
                inputGuess.value = '';
                inputGuess.focus();
            }
        }

        function endGame() {
            inputGuess.disabled = true;
            document.getElementById('replayBtn').style.display = 'block';
        }

        function renderClassic(pj) {
            const row = document.createElement('div'); row.className = 'row';
            const check = (a, b) => a === b ? 'correct' : 'incorrect-btn';
            row.innerHTML = `
                <div class="cell ${check(pj.nombre, objetivo.nombre)}"><span>LUCHADOR</span>${pj.nombre}</div>
                <div class="cell ${check(pj.genero, objetivo.genero)}"><span>GÉNERO</span>${pj.genero}</div>
                <div class="cell ${check(pj.faccion, objetivo.faccion)}"><span>FACCIÓN</span>${pj.faccion}</div>
                <div class="cell ${check(pj.clase, objetivo.clase)}"><span>CLASE</span>${pj.clase}</div>
                <div class="cell ${check(pj.rango, objetivo.rango)}"><span>RANGO</span>${pj.rango}</div>
            `;
            resultsContainer.prepend(row);
        }

        function renderLetroso(val) {
            const row = document.createElement('div'); row.className = 'letroso-row';
            const objNombre = objetivo.nombre;
            const res = new Array(val.length).fill('incorrect');
            
            // Diccionario para contar letras disponibles en el objetivo
            let counts = {};
            for (let char of objNombre) counts[char] = (counts[char] || 0) + 1;

            // Primera pasada: Buscar Verdes (Correctos)
            for (let i = 0; i < val.length; i++) {
                if (val[i] === objNombre[i]) {
                    res[i] = 'correct';
                    counts[val[i]]--;
                }
            }

            // Segunda pasada: Buscar Amarillos (Presentes)
            for (let i = 0; i < val.length; i++) {
                if (res[i] !== 'correct' && counts[val[i]] > 0) {
                    res[i] = 'present';
                    counts[val[i]]--;
                }
            }

            for (let i = 0; i < val.length; i++) {
                const cell = document.createElement('div');
                cell.className = 'letroso-cell ' + res[i];
                cell.textContent = val[i];
                row.appendChild(cell);
            }
            resultsContainer.prepend(row);
        }

        function renderUltimate(pj) {
            const div = document.createElement('div');
            div.className = `ultimate-box ${pj.nombre === objetivo.nombre ? 'correct' : 'incorrect-btn'}`;
            div.style.border = "none";
            div.style.color = "white";
            div.textContent = pj.nombre + (pj.nombre === objetivo.nombre ? " (CORRECTO)" : " (FALLIDO)");
            resultsContainer.prepend(div);
        }

        inputGuess.addEventListener('input', showDropdown);
        inputGuess.addEventListener('keypress', (e) => { if(e.key === 'Enter') makeGuess(); });
        document.addEventListener('click', (e) => {
            if (!inputGuess.contains(e.target) && !dropdownMenu.contains(e.target)) dropdownMenu.style.display = 'none';
        });

        resetGame();
    </script>
</body>
</html>
